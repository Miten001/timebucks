services:
  - type: worker
    name: mini-games-bot
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false      # <-- Aap Render dashboard mein paste karoge
      - key: ADMIN_ID
        sync: false      # <-- @userinfobot se aapka Telegram ID
      - key: SPONSOR_CHANNELS
        value: ""        # Khali rakho abhi, baad mein add karoge
      - key: COIN_TO_INR
        value: "0.01"
      - key: MIN_REDEEM_COINS
        value: "5000"
      - key: PYTHON_VERSION
        value: "3.11.9"

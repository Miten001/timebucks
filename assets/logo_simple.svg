<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#FF4757"/>
      <stop offset="100%" style="stop-color:#C00B26"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#redGrad)"/>

  <!-- Big coin in background -->
  <circle cx="256" cy="256" r="180" fill="url(#goldGrad)" opacity="0.25" stroke="#FFFFFF" stroke-width="4" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.2" stroke-dasharray="8,8"/>

  <!-- MOBI -->
  <text x="256" y="240"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="120"
        font-weight="900"
        text-anchor="middle"
        fill="#FFFFFF"
        stroke="#000"
        stroke-width="5"
        filter="url(#shadow)"
        letter-spacing="6">MOBI</text>

  <!-- GAMES -->
  <text x="256" y="340"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="90"
        font-weight="900"
        text-anchor="middle"
        fill="url(#goldGrad)"
        stroke="#000"
        stroke-width="4"
        filter="url(#shadow)"
        letter-spacing="10">GAMES</text>

  <!-- Crown -->
  <g transform="translate(256, 130)" filter="url(#shadow)">
    <path d="M -50 0 L -35 -35 L -20 -10 L 0 -45 L 20 -10 L 35 -35 L 50 0 Z" fill="url(#goldGrad)" stroke="#000" stroke-width="3"/>
    <circle cx="-35" cy="-32" r="4" fill="#EC4899"/>
    <circle cx="0"   cy="-42" r="5" fill="#3B82F6"/>
    <circle cx="35"  cy="-32" r="4" fill="#10B981"/>
  </g>

  <!-- Tagline -->
  <text x="256" y="410"
        font-family="Arial, sans-serif"
        font-size="24"
        font-weight="900"
        text-anchor="middle"
        fill="#FFFFFF"
        letter-spacing="6">14 GAMES • EARN COINS</text>
</svg>

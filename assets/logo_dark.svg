<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#06B6D4"/>
      <stop offset="50%"  style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bgDark)"/>

  <!-- Grid pattern (gaming feel) -->
  <g stroke="#8B5CF6" stroke-width="1" opacity="0.15">
    <line x1="0" y1="100" x2="512" y2="100"/>
    <line x1="0" y1="200" x2="512" y2="200"/>
    <line x1="0" y1="300" x2="512" y2="300"/>
    <line x1="0" y1="400" x2="512" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="512"/>
    <line x1="200" y1="0" x2="200" y2="512"/>
    <line x1="300" y1="0" x2="300" y2="512"/>
    <line x1="400" y1="0" x2="400" y2="512"/>
  </g>

  <!-- Glowing pixel-art controller icon -->
  <g transform="translate(256, 170)" filter="url(#glow)">
    <rect x="-80" y="-20" width="160" height="50" rx="20" fill="none" stroke="url(#neonGrad)" stroke-width="6"/>
    <circle cx="-50" cy="5" r="6" fill="#06B6D4"/>
    <circle cx="50"  cy="-5" r="6" fill="#EC4899"/>
    <circle cx="60"  cy="15" r="6" fill="#8B5CF6"/>
  </g>

  <!-- MOBI -->
  <text x="256" y="310"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="115"
        font-weight="900"
        text-anchor="middle"
        fill="url(#neonGrad)"
        filter="url(#glow)"
        letter-spacing="8">MOBI</text>

  <!-- GAMES -->
  <text x="256" y="395"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="75"
        font-weight="900"
        text-anchor="middle"
        fill="#FFFFFF"
        filter="url(#glow)"
        letter-spacing="12">GAMES</text>

  <!-- Tagline -->
  <text x="256" y="450"
        font-family="Arial, sans-serif"
        font-size="20"
        font-weight="700"
        text-anchor="middle"
        fill="#06B6D4"
        opacity="0.9"
        letter-spacing="6">PLAY • EARN • WIN</text>
</svg>
